<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        canvas {
            display: block;
            width: auto;
            height: auto;
            background-color: black;
        }
    </style>
</head>

<body>
    <canvas id="canvas" width="700" height="700"></canvas>
</body>

<script>
    const canvas = document.querySelector("#canvas")
    const ctx = canvas.getContext("2d")
    canvas.height = window.innerHeight
    canvas.width = window.innerWidth

    var MouseX = 0, MouseY = 0;
    class Client {
        constructor() {
            this.x = 0
            this.y = 0
            this.radius = 10
            this.available = false
        }
    }
    const client = new Client()
    document.addEventListener("mousemove", (e) => {
        client.x = e.clientX
        client.y = e.clientY
    })
    canvas.addEventListener("mouseover", () => {
        client.available = true
    })
    canvas.addEventListener("mouseout", () => {
        client.available = false
    })

    class Ball {
        constructor(x, y) {
            this.x = x
            this.y = y
            this.targetX = x
            this.targetY = y
            this.radius = 1;
            this.vx = 0;
            this.vy = 0;
            this.color = "#ffffff"
        }

        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
            ctx.closePath();
        }

        move() {
            let dx = this.targetX - this.x;
            let dy = this.targetY - this.y;
            let angle0 = Math.atan2(dy, dx)
            let distance0 = Math.sqrt(dx * dx + dy * dy)
            let force0 = distance0 * distance0 / 15

            let px = this.x - client.x;
            let py = this.y - client.y;
            let angle1 = Math.atan2(py, px)
            let distance1 = Math.sqrt(px * px + py * py)
            let force1 = 100000 / (distance1 * distance1)
            if (!client.available) {
                force1 = 0
            } else if (distance1 > 500) force1 -= 0.0001 * distance1


            let accX = (force0 * Math.cos(angle0) + force1 * Math.cos(angle1))
            let accY = (force0 * Math.sin(angle0) + force1 * Math.sin(angle1))

            // adding these lines can prevent particles from moving to exact position
            // accX=(Math.abs(accX)<=1?0:accX-Math.sign(accX)*10)
            // accY=(Math.abs(accY)<=1?0:accY-Math.sign(accY)*10)

            let vx = Math.sign(accX) * Math.min(Math.abs(accX), 10) * 0.2
            let vy = Math.sign(accY) * Math.min(Math.abs(accY), 10) * 0.2
            this.x += vx
            this.y += vy

        }

    }


    var circles = []

    const updateBg = () => {
        ctx.fillStyle = 'rgba(0,0,0,1)';
        ctx.fillRect(0, 0, canvas.width, canvas.height)
    }

    const img = new Image();
    img.src = "./test.png";

    img.onload = () => {
        const Hiddencanvas = document.createElement("canvas");
        const Hiddenctx = Hiddencanvas.getContext("2d");

        Hiddencanvas.width = canvas.width;
        Hiddencanvas.height = canvas.height;

        Hiddenctx.drawImage(img, canvas.width / 2 - img.width / 2, canvas.height / 2 - img.height / 2);

        const { data, width, height } = Hiddenctx.getImageData(0, 0, canvas.width, canvas.height);

        const step = 5; // sample every 5 pixels

        for (let y = 0; y < height; y += step) {
            for (let x = 0; x < width; x += step) {
                const i = (y * width + x) * 4;

                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];
                const a = data[i + 3];

                if ((r + g + b) >= (255 * 3 / 1.25)) {
                    circles.push(new Ball(x, y));
                }
            }
        }

        // init ball position
        // circles.forEach(ball => {
        //     ball.x = -10
        //     ball.y = -10
        // });
    };

    setInterval(() => {
        updateBg()
        circles.forEach(b => {
            b.draw()
            b.move()
        })
    }, 10)

</script>

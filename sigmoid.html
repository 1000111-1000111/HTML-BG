<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        h1{
            /*primary color #0099cc*/
            /*secondary color #a6f8fa*/
            /*primary color with gradient #2ce2e7*/
            /*secondary color with gradient #83e3ff*/
            position: absolute;
            top: 50%;
            left: 50%;
            color: #2ce2e7;
            font-family: "JetBrains Mono", monospace;
            transform: translate(-50%, -100%);
            font-size: 12.5vw;
            border-radius: 1rem;
            text-shadow: #83e3ff 0 0 8rem;
        }

        @keyframes breathe {

            0% {
                opacity: 100%;
            }
            50% {
                opacity: 10%;
            }
            100% {
                opacity: 100%;
            }
        }
        h1 span{
            animation-name: breathe;
            animation-duration: 5s;
            animation-iteration-count: infinite;
            animation-timing-function: linear;
            transform-origin: 0 0;
        }
    </style>
</head>
<body>
    <h1><b id="h"></b><span>:</span><b id="m"></b><span>:</span><b id="s"></b></h1>
    <canvas></canvas>
</body>
<script>
    const canvas = document.querySelector('canvas');
    const ctx = canvas.getContext('2d');
    const random=(a,b)=>Math.random()*(b-a)+a;

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    class Ball{
        constructor() {
            this.x=random(0,canvas.width);
            this.y=random(-50,canvas.height);
            this.height=random(100,canvas.height-50)
            this.sigmoidScale=random(5,30);
            this.radius=random(1,5);
            this.speed=random(1,3);
            this.reverse=random(0,1)>0.5?1:-1;
            this.color=`rgb(${random(0,255)},${random(0,255)},${random(0,255)})`;
            this.trailCount=0;
        }
        Sigmoid(x) {
            x=((x/canvas.width)*(2*this.sigmoidScale)-this.sigmoidScale)*this.reverse;
            return 1 / (1 + Math.exp(-x));
        }

        draw() {
            for(let i=0;i<=this.trailCount;i++){
                ctx.beginPath();
                let _x=i*this.reverse*this.speed;
                ctx.arc(this.x-_x, this.y+this.Sigmoid(this.x-_x)*this.height, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha=1-i/199;
                ctx.fill();
                if(this.trailCount>199) this.trailCount=199;
                ctx.closePath()
            }
        }

        update(){
            this.x+=this.reverse*this.speed;
            this.trailCount++;
        }

        outOfBounds(){
            return this.x>canvas.width+this.trailCount*this.speed+this.radius
                || this.x<-this.trailCount*this.speed-this.radius;
        }
    }

    let balls = [];
    let controller=0;
    (()=> {
        if (typeof Game_Interval != 'undefined') clearInterval(Game_interval);
        var Game_Interval = setInterval(() => {
            ctx.fillStyle = 'rgba(0,0,0,0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height)
            if (controller % 50 === 0) {
                console.log(balls.length)
                balls.push(new Ball());
                controller = 0;
            }
            for (let i = 0; i < balls.length; i++) {
                balls[i].draw();
                balls[i].update();
                if (balls[i].outOfBounds()) {
                    balls.splice(i, 1);
                    i--;
                }
            }
            controller++;
        }, 8);
    })()

</script>
<script>
    // JavaScript to handle canvas resizing
    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });
</script>
<script>
    // JavaScript to handle time
    const h = document.getElementById('h');
    const m = document.getElementById('m');
    const s = document.getElementById('s');

    setInterval(() => {
        const date = new Date();
        h.innerText = date.getHours().toString().padStart(2, '0');
        m.innerText = date.getMinutes().toString().padStart(2, '0');
        s.innerText = date.getSeconds().toString().padStart(2, '0');
    }, 10);
</script>
</html>

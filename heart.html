<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        body{
            padding: 0;
            margin: 0;
            width: 100vw;
            height: 100vh;
            background-image: linear-gradient(to bottom,#83e3ffE0, #ffffff);
        }
        svg{
            position: absolute;
            top: 50%;
            left: 50%;
            width: 75%;
            height: 75%;
            transform: translate(-50%, -50%);

        }
        @keyframes beat {
            0% {
                transform: scale(1) translate(-50%, -50%);
            }
            40% {
                transform: scale(1) translate(-50%, -50%);
            }
            45% {
                transform: scale(1.1) translate(-50%, -50%);
            }
            50% {
                transform: scale(1) translate(-50%, -50%);
            }
            55% {
                transform: scale(1.1) translate(-50%, -50%);
            }
            60% {
                transform: scale(1) translate(-50%, -50%);
            }
            100% {
                transform: scale(1) translate(-50%, -50%);
            }
        }
        svg{
            animation: beat 1s infinite linear;
            transform-origin: -0% -0%;
        }
    </style>
</head>
